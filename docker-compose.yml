version: "3.9"

services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:16-alpine
    container_name: archguard-postgres
    environment:
      POSTGRES_USER: archguard
      POSTGRES_PASSWORD: archguard_secret
      POSTGRES_DB: archguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Neo4j ───
  neo4j:
    image: neo4j:5.17-community
    container_name: archguard-neo4j
    environment:
      NEO4J_AUTH: neo4j/archguard_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: archguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: archguard-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://archguard:archguard_secret@postgres:5432/archguard
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=archguard_neo4j
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=super-secret-change-in-production
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
